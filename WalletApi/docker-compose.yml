services:
  db:
    image: postgres:17-alpine
    container_name: wallet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: wallet_db
    ports:
      - "5442:5432"
    volumes:
      - wallet_data:/var/lib/postgresql/data

volumes:
  wallet_data: